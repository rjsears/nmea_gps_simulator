services:
  dashboard:
    image: rjsears/fleet-dashboard:latest
    pull_policy: always
    container_name: fleet-dashboard
    restart: unless-stopped
    network_mode: host
    security_opt:
      - "apparmor:unconfined"
    environment:
      # Server configuration
      - HOST=0.0.0.0
      - PORT=80

      # Simulator configuration
      # Each emulator should send UDP to this dashboard's IP on its assigned port
      - SIM_1_NAME=CJ3
      - SIM_1_PORT=12001
      - SIM_2_NAME=Ultra
      - SIM_2_PORT=12002
      - SIM_3_NAME=CJ1
      - SIM_3_PORT=12003
      - SIM_4_NAME=CE560XL
      - SIM_4_PORT=12004
      - SIM_5_NAME=Classic CJ1
      - SIM_5_PORT=12005
      - SIM_6_NAME=CL350
      - SIM_6_PORT=12006
